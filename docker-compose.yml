services:
  any-sync-bundle:
    image: ghcr.io/grishy/any-sync-bundle:latest
    container_name: any-sync-bundle
    restart: unless-stopped
    environment:
      ANY_SYNC_BUNDLE_INIT_EXTERNAL_ADDRS: ${TAILSCALE_IP:?set TAILSCALE_IP to the VM tailscale IPv4}
    volumes:
      - /opt/anytype-vault/data:/data
